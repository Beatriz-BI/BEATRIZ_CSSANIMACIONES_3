<html>
    <head>
        <title></title>
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            #contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position: relative;/* se elige relative, porque se trata del contenedor padre, dentro del cual habra elementos */
                margin:0 auto;/* centrar el contenedor*/
                overflow: hidden; /* contenedor como marco de una ventana, oculta todo lo que contiene */
            }
            #cuadrito{
                width: 100px;
                height: 100px;
                background-color: blue;
                position: absolute; /* obligatorio para mover el div */
                top: 50px;
                left: 350px;
                animation: cuadrito 3s infinite linear;
                animation-timing-function: linear; /* define la forma de moverse */
            }

            @keyframes cuadrito{
                from{
                    left:-100px;
                }
                to{
                    left:500px;
                }
            }


        </style>
    </head>
    <body>
        <div id="contenedor">
            <div id="cuadrito">  </div>
        </div>
    </body>
</html>
